<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurix4x AI Gold Analyzer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #1e293b; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; text-align: center; border: 1px solid #fbbf24; }
        h2 { color: #fbbf24; margin-bottom: 1.5rem; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        select { background: #334155; color: white; }
        button { background: #fbbf24; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #f59e0b; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; background: #334155; min-height: 50px; font-weight: bold; }
        .price-up { color: #4ade80; }
        .loading { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>Aurix4x AI Analyzer</h2>
    
    <label for="pair">Select Trading Pair:</label>
    <select id="pair">
        <option value="XAUUSD">XAU/USD (Gold)</option>
        <option value="BTCUSD">BTC/USD (Bitcoin)</option>
    </select>

    <button onclick="analyze()">Analyze Live Price</button>

    <div id="result">Waiting for analysis...</div>
</div>

<script>
async function analyze() {
    const resultDiv = document.getElementById("result");
    const pair = document.getElementById("pair").value;
    const apiKey = "bc045d74482d4842848d3cf13b3f7992"; // Twelve Data API Key

    if (pair !== "XAUUSD") {
        resultDiv.innerHTML = "<span style='color: #f87171;'>Error: Only XAUUSD is currently supported by AI Core.</span>";
        return;
    }

    resultDiv.innerHTML = "<span class='loading'>Fetching Live Market Data...</span>";

    try {
        // Fetching real-time price from Twelve Data
        const response = await fetch(`https://api.twelvedata.com/price?symbol=XAU/USD&apikey=${apiKey}`);
        const data = await response.json();

        if (data.price) {
            const price = parseFloat(data.price).toFixed(2);
            resultDiv.innerHTML = `
                <div style="font-size: 0.9rem; color: #94a3b8;">Current Status:</div>
                <div class="price-up" style="font-size: 1.5rem; margin: 5px 0;">$${price}</div>
                <div style="font-size: 0.8rem; color: #fbbf24; border-top: 1px solid #475569; pt-2; mt-2;">
                    AI Bias: Neutral / Consolidation<br>
                    Support: $5,050 | Resistance: $5,153
                </div>
            `;
        } else {
            resultDiv.innerHTML = "API Error: Check Key or Limit.";
        }
    } catch (error) {
        resultDiv.innerHTML = "Connection Failed.";
    }
}
</script>

</body>
</html>
